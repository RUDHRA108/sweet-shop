<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET SHOP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #c85e12;
                text-align: center;
                margin-bottom: 20px;
                box-shadow: #000000 0px 2px 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            display: block;
            margin: 10px auto;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            width: fit-content; 
        }
        a:hover {
            background-color: #04d60e;
        }
        .token-cutter-button {
            display: inline-block;
            margin: 10px 0 0 10px;
            padding: 10px 16px;
            background-color: #ff8c00;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
        }
        .token-cutter-button:hover {
            background-color: #e67e22;
        }
        .token-result {
            margin: 14px 0 0 10px;
            font-size: 0.95rem;
            color: #333;
            font-weight: 600;
        }
        h2 {
            color: #030200;
            text-align: center;
            margin-top: 60px;
            text-decoration: underline ;
        }
    </style>
</head>
<body>
    <h1>LANGOOR SWEET PRODUCTS</h1>
    <a href="add-product.html">Add Product</a>
    <button class="token-cutter-button" onclick="openTokenCutter()">Token Cutter</button>
    <div id="tokenResult" class="token-result"></div>

    <h2>Products</h2>
    <table id="productTable">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Remaining Quantity</th>
            <th>Total Quantity</th>
        </tr>
    </table>
    <script src="script.js"></script>
</body>
</html>
